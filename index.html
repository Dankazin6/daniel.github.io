<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ranking Cyberpunk</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Orbitron', sans-serif;
  margin: 0;
  color: #e0f7ff;
  overflow-x: hidden;
  background: black;
}

/* GRID ANIMADO */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(#0ff1 1px, transparent 1px),
              linear-gradient(90deg, #0ff1 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveGrid 10s linear infinite;
  z-index: -1;
}

@keyframes moveGrid {
  from {transform: translateY(0);}
  to {transform: translateY(40px);}
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  background: linear-gradient(90deg, #0ff, #a020f0);
  color: black;
}

/* CONTAINER */
.container {
  padding: 20px;
}

/* BOTÕES */
select, button {
  padding: 10px;
  margin: 5px;
  background: rgba(0,0,0,0.7);
  color: #0ff;
  border: 1px solid #0ff;
  border-radius: 8px;
}

/* HOVER */
button:hover {
  background: #0ff;
  color: black;
  box-shadow: 0 0 15px #0ff;
  cursor: pointer;
}

/* CARD */
.card {
  background: rgba(20,20,30,0.7);
  padding: 12px;
  margin: 10px 0;
  border-left: 4px solid #a020f0;
  border-radius: 8px;
  box-shadow: 0 0 10px #a020f0;
}

/* BARRA DE PROGRESSO */
.progress {
  height: 10px;
  background: #222;
  border-radius: 5px;
  margin-top: 5px;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #0ff, #a020f0);
  border-radius: 5px;
}

/* CANVAS PARTÍCULAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -2;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<header>⚡ Ranking Cyberpunk ⚡</header>

<div class="container">

<select id="aluno"></select>
<select id="atividade"></select>

<br>

<button onclick="add()">+40</button>
<button onclick="removePts()">-40</button>
<button onclick="reset()">Zerar</button>

<div id="ranking"></div>

</div>

<script>
// SOM CLIQUE
const audio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-fire-shot-1691.mp3");

// ALUNOS
const alunos = [
"Alice Campos Menim","Davi Bobo Correia","Emanuel Geraldo Talarico da Silva","Enzo",
"João Pedro Nicolini de Araújo","João Vinícius Correia Coelho","Josiane Aparecida Machado Bezerra",
"Júlia Cássia de Souza","Lorena Rosa Torres","Lorenzo Gabriel Sakamoto Rabelo",
"Maria Gabrielle Mendes de Freitas","Miguel Campos Menim","Miguel Heleno Correia Coelho",
"Miguel Mariano Ferreira Castineiras","Mirella de Oliveira Semegini","Murilo Campos Menim",
"Murilo da Silva Vágula","Nicolas Eduardo da Silva Vágula","Paquelícia Conceição Guerra",
"Pedro Miguel Silva Luzete","Ricardo Augusto de Oliveira Celestino","Stephanie Paulina Couto"
];

const atividades = Array.from({length:12}, (_,i)=>"Atividade "+(i+1));

let pontos = JSON.parse(localStorage.getItem("pontos")) || {};

const selAluno = document.getElementById("aluno");
const selAtv = document.getElementById("atividade");

alunos.forEach(a=>{
  let o=document.createElement("option");
  o.text=a;
  selAluno.add(o);
});

atividades.forEach(a=>{
  let o=document.createElement("option");
  o.text=a;
  selAtv.add(o);
});

function playSound(){
  audio.currentTime = 0;
  audio.play();
}

function add(){
  let a = selAluno.value;
  pontos[a] = (pontos[a]||0)+40;
  salvar();
  playSound();
}

function removePts(){
  let a = selAluno.value;
  if(!pontos[a]) return;
  pontos[a]-=40;
  if(pontos[a]<=0) delete pontos[a];
  salvar();
  playSound();
}

function reset(){
  if(confirm("Zerar ranking?")){
    pontos={};
    salvar();
  }
}

function salvar(){
  localStorage.setItem("pontos",JSON.stringify(pontos));
  render();
}

function render(){
  let div=document.getElementById("ranking");
  div.innerHTML="";
  let lista=Object.entries(pontos).sort((a,b)=>b[1]-a[1]);

  lista.forEach((p,i)=>{
    let percent = Math.min((p[1]/480)*100,100);

    let el=document.createElement("div");
    el.className="card";
    el.innerHTML=`
      #${i+1} ${p[0]} - ${p[1]} pts
      <div class="progress">
        <div class="progress-bar" style="width:${percent}%"></div>
      </div>
    `;
    div.appendChild(el);
  });
}

render();

/* PARTÍCULAS */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    vx: Math.random()-0.5,
    vy: Math.random()-0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#0ff";

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>canvas.width) p.vx*=-1;
    if(p.y<0||p.y>canvas.height) p.vy*=-1;

    ctx.fillRect(p.x,p.y,2,2);
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
