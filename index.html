<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ranking Cyberpunk</title>

<style>
body {
  font-family: Arial;
  background: #050510;
  color: #00ffff;
  margin: 0;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  background: #0a0a0a;
  text-shadow: 0 0 10px #00ffff;
}

.container {
  padding: 20px;
}

select, button {
  padding: 10px;
  margin: 5px;
  background: black;
  color: #00ffff;
  border: 1px solid #00ffff;
}

button:hover {
  background: #00ffff;
  color: black;
  cursor: pointer;
}

.card {
  background: #111;
  padding: 10px;
  margin: 5px 0;
  border-left: 4px solid #00ffff;
}
</style>
</head>

<body>

<header>⚡ Ranking Cyberpunk ⚡</header>

<div class="container">

<h3>Registrar Atividade</h3>

<select id="aluno"></select>

<select id="atividade"></select>

<br>

<button onclick="adicionar()">+40 pontos</button>
<button onclick="remover()">-40 pontos</button>

<div id="ranking"></div>

</div>

<script>
const alunos = [
"Alice Campos Menim","Davi Bobo Correia","Emanuel Geraldo Talarico da Silva","Enzo",
"João Pedro Nicolini de Araújo","João Vinícius Correia Coelho","Josiane Aparecida Machado Bezerra",
"Júlia Cássia de Souza","Lorena Rosa Torres","Lorenzo Gabriel Sakamoto Rabelo",
"Maria Gabrielle Mendes de Freitas","Miguel Campos Menim","Miguel Heleno Correia Coelho",
"Miguel Mariano Ferreira Castineiras","Mirella de Oliveira Semegini","Murilo Campos Menim",
"Murilo da Silva Vágula","Nicolas Eduardo da Silva Vágula","Paquelícia Conceição Guerra",
"Pedro Miguel Silva Luzete","Ricardo Augusto de Oliveira Celestino","Stephanie Paulina Couto"
];

const atividades = [
"Atividade 1 - Lógica Básica",
"Atividade 2 - Digitação",
"Atividade 3 - Internet",
"Atividade 4 - Segurança",
"Atividade 5 - Word",
"Atividade 6 - Excel",
"Atividade 7 - PowerPoint",
"Atividade 8 - Hardware",
"Atividade 9 - Sistemas",
"Atividade 10 - Redes",
"Atividade 11 - Programação",
"Atividade 12 - Projeto Final"
];

let pontos = JSON.parse(localStorage.getItem("pontos")) || {};

const selectAluno = document.getElementById("aluno");
const selectAtividade = document.getElementById("atividade");

// preencher alunos
alunos.forEach(a => {
  let opt = document.createElement("option");
  opt.value = a;
  opt.textContent = a;
  selectAluno.appendChild(opt);
});

// preencher atividades
atividades.forEach(a => {
  let opt = document.createElement("option");
  opt.value = a;
  opt.textContent = a;
  selectAtividade.appendChild(opt);
});

function adicionar() {
  let aluno = selectAluno.value;

  if (!pontos[aluno]) pontos[aluno] = 0;

  pontos[aluno] += 40;
  salvar();
}

function remover() {
  let aluno = selectAluno.value;

  if (!pontos[aluno]) return;

  pontos[aluno] -= 40;

  if (pontos[aluno] < 0) pontos[aluno] = 0;

  salvar();
}

function salvar() {
  localStorage.setItem("pontos", JSON.stringify(pontos));
  atualizarRanking();
}

function atualizarRanking() {
  let div = document.getElementById("ranking");
  div.innerHTML = "";

  let lista = Object.entries(pontos).sort((a,b) => b[1]-a[1]);

  lista.forEach((item, i) => {
    let el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `#${i+1} ${item[0]} - ${item[1]} pts`;
    div.appendChild(el);
  });
}

atualizarRanking();
</script>

</body>
</html>
