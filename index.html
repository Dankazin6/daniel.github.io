<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Conquistas do Curso</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }
    section {
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
    button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <h1>Conquistas dos Alunos</h1>
</header>

<section>
  <div class="card">
    <h2>João</h2>
    <p>Conseguiu seu primeiro emprego em TI</p>
  </div>

  <div class="card">
    <h2>Maria</h2>
    <p>Aprendeu programação do zero</p>
  </div>

  <button onclick="alert('Entre em contato!')">
    Fale Conosco
  </button>
</section>

</body>
</html>
